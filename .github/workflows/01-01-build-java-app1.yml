name: Build Java App

on:
  workflow_dispatch:
  #push:    # NOTE: Will not work with inputs. No environment selection would be possible using this method.
  #  branches: [ main ]
    inputs:
      environment:
        type: string
        required: true
        description: "dev | stag | prod"

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: 390157243794
  AWS_REGION: eu-west-2
  WORKDIR: "./jvx"

jobs:
  jvx-build:
    runs-on: ubuntu-latest

    steps:
      # INFO: Prereq
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/iac-aws-oidcRole-app-jvx
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # INFO: Build jvx
      - name: Lint
        working-directory: ${{ env.WORKDIR }}    
        run: mvn checkstyle:check

      - name: Test
        working-directory: ${{ env.WORKDIR }}        
        run: mvn test

      - name: Build
        working-directory: ${{ env.WORKDIR }}
        run: mvn package -DskipTests

      # INFO: Cleanup S3 bucket from old artifacts
      - name: Keep last N artifacts
        run: |
          aws s3 ls s3://rk-artifact/ | sort | head -n -3 | awk '{print $4}' | while read f; do
            aws s3 rm s3://rk-artifact/$f
          done

      # INFO: Upload newly build artifact
      - name: Upload artifact to S3
        working-directory: ${{ env.WORKDIR }}
        run: aws s3 cp target/myapp.jar s3://rk-artifact/jvx-${{ github.sha }}.jar

      # INFO: Update SSM

      - name: Backup previous version
        run: |
          PREV=$(aws ssm get-parameter --name "/jvx/version" --query "Parameter.Value" --output text || echo "none")
          aws ssm put-parameter \
            --name "/jvx/version_previous" \
            --value "$PREV" \
            --type String \
            --overwrite

      - name: Update version in SSM
        run: |
          aws ssm put-parameter \
            --name "/jvx/version" \
            --value "${{ github.sha }}" \
            --type String \
            --overwrite

      # INFO: Health‑gated ASG refresh
      - name: Set ASG name
        id: asg
        run: |
          if [ "${{ github.event.inputs.environment }}" = "dev" ]; then
            echo "ASG_NAME=operations-dev-jvx-asg" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" = "stag" ]; then
            echo "ASG_NAME=operations-stag-jvx-asg" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "ASG_NAME=operations-prod-jvx-asg" >> $GITHUB_ENV
          else
            echo "Unknown environment"
            exit 1
          fi

      - name: Trigger ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
          --auto-scaling-group-name $ASG_NAME \
          --preferences '{"MinHealthyPercentage": 90}'

      - name: Wait for ASG refresh to complete
        run: |
          REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name $ASG_NAME \
            --query "InstanceRefreshes[0].InstanceRefreshId" \
            --output text)

          echo "Waiting for refresh $REFRESH_ID"

          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --instance-refresh-ids $REFRESH_ID \
              --query "InstanceRefreshes[0].Status" \
              --output text)

            echo "Status: $STATUS"

            if [ "$STATUS" = "Successful" ]; then
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Instance refresh failed"
              exit 1
            fi

            sleep 15
          done

      # INFO: Automatic rollback on failed deployment
      - name: Rollback to previous version
        if: failure()
        run: |
          PREV=$(aws ssm get-parameter --name "/jvx/version_previous" --query "Parameter.Value" --output text)

          echo "Rolling back to $PREV"

          aws ssm put-parameter \
            --name "/jvx/version" \
            --value "$PREV" \
            --type String \
            --overwrite

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences '{"MinHealthyPercentage": 150}'

      # INFO: Add Deployment summary to GitHub Actions
      - name: Deployment summary
        run: |
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Version deployed: ${{ github.sha }}"
          echo "Previous version: $(aws ssm get-parameter --name "/jvx/version_previous" --query "Parameter.Value" --output text)"